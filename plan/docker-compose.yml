version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tour_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tour_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql

  api:
    build: ./backend
    container_name: tour_crm_api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:localdevpassword@postgres:5432/tour_crm
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env

volumes:
  pgdata:
