<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings — Login</title>
<link rel="stylesheet" href="css/portal.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-mark">✈</div>
        <h1>My Bookings</h1>
        <p class="auth-subtitle">Login with your registered email</p>
    </div>

    <!-- Step 1: Email -->
    <div id="step-email">
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <button class="btn-primary" id="btn-send-otp">Send OTP</button>
        <p id="email-error" class="error-msg"></p>
    </div>

    <!-- Step 2: OTP -->
    <div id="step-otp" class="hidden">
        <p class="otp-hint">Enter the 6-digit OTP sent to <strong id="email-display"></strong></p>
        <div class="otp-inputs">
            <input type="text" maxlength="1" class="otp-box" data-index="0">
            <input type="text" maxlength="1" class="otp-box" data-index="1">
            <input type="text" maxlength="1" class="otp-box" data-index="2">
            <input type="text" maxlength="1" class="otp-box" data-index="3">
            <input type="text" maxlength="1" class="otp-box" data-index="4">
            <input type="text" maxlength="1" class="otp-box" data-index="5">
        </div>
        <button class="btn-primary" id="btn-verify-otp">Verify OTP</button>
        <p id="otp-error" class="error-msg"></p>
        <button class="btn-link" id="btn-resend">Resend OTP</button>
    </div>

    <div id="loading" class="hidden loader-wrap"><div class="loader"></div></div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
